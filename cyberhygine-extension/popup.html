<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cyber Hygiene</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg0: #000000;
        --bg1: #0a0e1a;
        --bg2: #0d1117;
        --panel: rgba(13, 17, 23, 0.95);
        --panel-hover: rgba(22, 27, 34, 0.98);
        --text: #e6edf3;
        --muted: #a9b3c1;
        --cyan: #00b5d8;
        --mint: #14f1d9;
        --danger: #ff5d7a;
        --warn: #f5c542;
        --ok: #1dd1a1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 380px;
        min-height: 460px;
        color: var(--text);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(120% 90% at 15% 5%, #0b1c2f 0%, transparent 45%),
          linear-gradient(145deg, var(--bg0), var(--bg1) 42%, var(--bg2));
      }

      .container {
        position: relative;
        padding: 14px;
      }

      .glow {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(180px 90px at 10% 0%, rgba(0, 181, 216, 0.18), transparent 70%),
          radial-gradient(160px 80px at 95% 100%, rgba(20, 241, 217, 0.1), transparent 72%);
        z-index: 0;
      }

      .stack {
        position: relative;
        z-index: 1;
      }

      .header-card {
        background: var(--panel);
        border: 1px solid rgba(0, 181, 216, 0.45);
        box-shadow: 0 8px 26px rgba(0, 181, 216, 0.15);
        border-radius: 14px;
        padding: 12px;
        margin-bottom: 10px;
      }

      .brand-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand-icon {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        border: 1px solid rgba(20, 241, 217, 0.55);
        box-shadow: 0 0 12px rgba(20, 241, 217, 0.35);
      }

      .brand-title {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 0.2px;
        line-height: 1.2;
        background: linear-gradient(90deg, var(--mint), var(--cyan));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        padding-bottom: 0.06em;
      }

      .domain-wrap {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 2px;
      }

      .label {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.2px;
      }

      .domain {
        max-width: 190px;
        font-weight: 700;
        font-size: 12px;
        color: #7fe8ff;
        text-overflow: ellipsis;
        overflow: hidden;
        white-space: nowrap;
      }

      .card {
        background: var(--panel);
        border: 1px solid rgba(0, 181, 216, 0.32);
        border-radius: 12px;
        padding: 11px;
        margin-bottom: 10px;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
      }

      .status {
        min-height: 40px;
        font-size: 12px;
        line-height: 1.45;
        border: 1px solid transparent;
      }

      .status.info {
        color: #c8e8f8;
        background: rgba(2, 132, 199, 0.14);
        border-color: rgba(2, 132, 199, 0.4);
      }

      .status.success {
        color: #d6ffef;
        background: rgba(29, 209, 161, 0.13);
        border-color: rgba(29, 209, 161, 0.42);
      }

      .status.warn {
        color: #fff8d1;
        background: rgba(245, 197, 66, 0.13);
        border-color: rgba(245, 197, 66, 0.42);
      }

      .status.error {
        color: #ffe6ee;
        background: rgba(255, 93, 122, 0.13);
        border-color: rgba(255, 93, 122, 0.42);
      }

      .hidden {
        display: none !important;
      }

      .loader {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .spinner {
        width: 15px;
        height: 15px;
        border-radius: 50%;
        border: 2px solid rgba(169, 179, 193, 0.3);
        border-top-color: var(--mint);
        animation: spin 0.9s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .field {
        margin-bottom: 10px;
      }

      .field label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      select {
        width: 100%;
        border-radius: 9px;
        border: 1px solid rgba(0, 181, 216, 0.42);
        background: rgba(7, 14, 24, 0.95);
        color: var(--text);
        padding: 9px;
        outline: none;
      }

      select:focus {
        border-color: var(--mint);
        box-shadow: 0 0 0 2px rgba(20, 241, 217, 0.22);
      }

      input {
        width: 100%;
        border-radius: 9px;
        border: 1px solid rgba(0, 181, 216, 0.42);
        background: rgba(7, 14, 24, 0.95);
        color: var(--text);
        padding: 9px;
        outline: none;
      }

      input:focus {
        border-color: var(--mint);
        box-shadow: 0 0 0 2px rgba(20, 241, 217, 0.22);
      }

      .actions {
        display: grid;
        gap: 8px;
      }

      .split-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      button {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.15px;
        transition: transform 0.15s ease, filter 0.2s ease;
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
        filter: brightness(1.07);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .btn-primary {
        background: linear-gradient(90deg, #0079b8, #00b5d8);
      }

      .btn-login {
        background: linear-gradient(90deg, #0f5dd8, #00a2ff);
      }

      .btn-secondary {
        background: linear-gradient(90deg, #233145, #1d2b3c);
        border-color: rgba(0, 181, 216, 0.35);
      }

      .btn-danger {
        background: linear-gradient(90deg, #b4234e, #ff5d7a);
      }

      .footer {
        margin-top: 9px;
        font-size: 11px;
        color: var(--muted);
        opacity: 0.95;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="glow"></div>
      <div class="stack">
        <div class="header-card">
          <div class="brand-row">
            <div class="brand-left">
              <img class="brand-icon" src="icons/icon32.png" alt="Cyber Hygiene" />
              <div class="brand-title">Cyber Hygiene</div>
            </div>
            <div class="domain-wrap">
              <span class="label">Domain</span>
              <span id="domainValue" class="domain">-</span>
            </div>
          </div>
        </div>

        <div id="status" class="card status info">Checking authentication...</div>

        <div id="loading" class="card loader hidden">
          <span class="spinner"></span>
          <span>Loading credentials...</span>
        </div>

        <div id="credentialsSection" class="card hidden">
          <div class="field">
            <label for="credentialSelect">Saved account</label>
            <select id="credentialSelect"></select>
          </div>
          <div class="actions">
            <button id="autofillBtn" class="btn-primary">Autofill</button>
          </div>
        </div>

        <div id="emptySection" class="card hidden">
          <div class="label">No credentials found for this domain.</div>
        </div>

        <div id="addSection" class="card hidden">
          <div class="field">
            <label for="addUsername">Username or email</label>
            <input id="addUsername" type="text" autocomplete="username" />
          </div>
          <div class="field">
            <label for="addPassword">Password</label>
            <input id="addPassword" type="password" autocomplete="current-password" />
          </div>
          <div class="split-actions">
            <button id="saveAddBtn" class="btn-primary">Save to Vault</button>
            <button id="cancelAddBtn" class="btn-secondary">Cancel</button>
          </div>
        </div>

        <div class="actions">
          <button id="loginBtn" class="btn-login hidden">Login to Cyber Hygiene</button>
          <button id="syncBtn" class="btn-secondary hidden">Sync Login Session</button>
          <button id="addOpenBtn" class="btn-secondary hidden">Add Credential</button>
          <button id="neverBtn" class="btn-secondary hidden"></button>
          <button id="refreshBtn" class="btn-secondary">Refresh</button>
        </div>

        <div class="footer">Exact domain matching is required before autofill.</div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
